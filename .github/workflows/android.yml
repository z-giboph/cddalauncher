name: Build CDDA Launcher APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.4'

    # Dito natin inayos ang AndroidX, Namespace, at nilinis ang sirang XML file
    - name: Fix Configurations and Source Code XML
      run: |
        echo "android.useAndroidX=true" >> gradle.properties
        sed -i '/android {/a \    namespace "com.cdda.launcher"' app/build.gradle
        
        # Tatanggalin nito ang anumang ligaw na character pagkatapos ng </resources> sa styles_overlay.xml
        sed -i '/<\/resources>/q' app/src/main/res/values/styles_overlay.xml

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cdda-launcher-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
